services:
  aigo-ai:
    build: .
    image: aigo-ai:dev
    container_name: aigo-ai-dev
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    environment:
      APP_ENV: dev
      DEBUG: "true"
      LOG_LEVEL: debug
    volumes:
      # app source code - hot reload
      - ./app:/app/app
      # for indexing, migration, etc.
      - ./scripts:/app/scripts
      # model weights cache - persist across runs
      - ./models:/models

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/app
      --proxy-headers
      --forwarded-allow-ips=*
      --timeout-keep-alive 75
      --log-level debug

    restart: unless-stopped

